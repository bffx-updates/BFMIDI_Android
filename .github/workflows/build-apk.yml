name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permite rodar manualmente pela aba Actions

permissions:
  contents: write       # necessario pra publicar o release com o APK

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk BFMIDI-editor.apk

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: BFMIDI-editor-apk
          path: BFMIDI-editor.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: BFMIDI Editor (build ${{ github.run_number }})
          files: BFMIDI-editor.apk
